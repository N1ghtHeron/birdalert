name: auto alert

on:
  schedule:
    - cron: "0 4 * * *"    # UTC 04:00 -> 北京时间 12:00
    - cron: "0 16 * * *"   # UTC 16:00 -> 北京时间 00:00
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
        # 如果有 requirements.txt，则安装依赖，否则可以自行添加所需包
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests beautifulsoup4 ebird-api
               requests PyGithub; fi


      - name: Generate markdown file
        run: python main.py --mode generate

      - name: Commit generated markdown file
        run: |
          git config --global user.email "noctivagantheron@gmail.com"
          git config --global user.name "N1ghtHeron"
          git add export/*.md
          git commit -m "Auto-generated markdown file" || echo "No changes to commit"
          git push origin main || echo "No changes to push"

      - name: Create GitHub issue
        run: python main.py --mode create-issue
